name: Polyglot lint autofix

# Runs the polyglot Rust-based formatter / linter toolchain
# (Mago for PHP, Ruff for Python, Taplo for TOML, rumdl for
# Markdown, cargo fmt for Rust) in autofix mode and pushes any
# resulting changes back to the PR branch so contributors don't have
# to fix formatting / lint by hand.
#
# Pattern mirrors `biome-autofix.yml` / `tofu-fmt-autofix.yml`. Inline
# for now (first instance of polyglot autofix in vivarium); flag for
# promotion to `aletheia-works/.github/.github/workflows/` when a
# second repo in the org needs the same logic, per AGENTS.md §4.8.
#
# `pull_request_target` so fork PRs see autofix run too — `pull_request`
# from a fork ships with read-only GITHUB_TOKEN, which can't push back.
# Same TF_TOKEN_GITHUB PAT as biome / tofu autofix; that PAT has
# write access to the maintainer's personal forks where `sl pr submit`
# lands every PR.
#
# SECURITY NOTE: combined with `secrets: inherit`, fork-PR PHP / Python /
# TOML / Markdown / Rust source is touched with an org-scoped PAT.
# Acceptable because each tool here is a textual formatter / linter
# (no code execution from PR sources during the workflow). Same posture
# as biome-autofix.yml.

on:
  pull_request_target:
    paths:
      - 'src/layer1_wasm/**/*.php'
      - 'src/layer1_wasm/**/*.py'
      - 'src/layer1_wasm/**/*.rs'
      - 'src/layer1_wasm/**/Cargo.toml'
      - 'src/layer1_wasm/**/Cargo.lock'
      - 'docs/scripts/**/*.py'
      - '**/*.toml'
      - '**/*.md'
      - 'mago.toml'
      - 'ruff.toml'
      - 'taplo.toml'
      - '.rumdl.toml'
      - 'mise.toml'
      - '.github/workflows/lint-autofix.yml'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: lint-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  autofix:
    name: Polyglot lint autofix
    if: github.repository_owner == 'aletheia-works'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.TF_TOKEN_GITHUB }}
          persist-credentials: true

      # ── Mago (PHP) ───────────────────────────────────────────────────
      - name: Install Mago
        env:
          MAGO_VERSION: '1.26.0'
        run: |
          set -euo pipefail
          curl -fL -o mago.tar.gz \
            "https://github.com/carthage-software/mago/releases/download/${MAGO_VERSION}/mago-${MAGO_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar xzf mago.tar.gz
          sudo install -m 755 mago/mago /usr/local/bin/mago

      # ── Ruff (Python) ────────────────────────────────────────────────
      - name: Install Ruff
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          version: '0.15.12'

      # ── Taplo (TOML) ─────────────────────────────────────────────────
      - name: Install Taplo
        env:
          TAPLO_VERSION: '0.10.0'
        run: |
          set -euo pipefail
          curl -fL -o taplo.gz \
            "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz"
          gunzip taplo.gz
          chmod +x taplo
          sudo install -m 755 taplo /usr/local/bin/taplo

      # ── rumdl (Markdown) ─────────────────────────────────────────────
      - name: Install rumdl
        env:
          RUMDL_VERSION: '0.1.90'
        run: |
          set -euo pipefail
          curl -fL -o rumdl.tar.gz \
            "https://github.com/rvben/rumdl/releases/download/v${RUMDL_VERSION}/rumdl-v${RUMDL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar xzf rumdl.tar.gz
          sudo install -m 755 rumdl /usr/local/bin/rumdl

      # ── Rust toolchain (cargo fmt) ───────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.84.0'
          targets: wasm32-wasip1
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/layer1_wasm/*/target
          key: lint-cargo-${{ runner.os }}-${{ hashFiles('src/layer1_wasm/**/Cargo.lock', 'src/layer1_wasm/**/Cargo.toml') }}
          restore-keys: |
            lint-cargo-${{ runner.os }}-

      # ── Apply autofixes per tool ─────────────────────────────────────
      # Each step writes in place. Genuine remaining diagnostics stay
      # as diagnostics — those will fail test-lint-check.yml and need
      # human attention. `|| true` guards against tools that exit
      # non-zero when there are still residual issues after autofix
      # (Mago lint --fix, Ruff check --fix); we deliberately don't
      # fail the autofix workflow on residuals.
      - name: PHP — Mago format + lint --fix --unsafe
        run: |
          mago format
          mago lint --fix --unsafe || true

      - name: Python — Ruff format + check --fix
        run: |
          ruff format
          ruff check --fix || true

      - name: TOML — Taplo fmt
        run: taplo fmt

      - name: Markdown — rumdl fmt
        run: rumdl fmt . || true

      - name: Rust — cargo fmt
        run: |
          set -euo pipefail
          shopt -s nullglob
          for cargo_toml in src/layer1_wasm/*/Cargo.toml; do
            echo "==> cargo fmt ${cargo_toml}"
            cargo fmt --manifest-path "${cargo_toml}"
          done
        shell: bash

      # Commit & push only when something actually changed.
      - name: Commit and push fixes
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet; then
            echo "No autofix changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: polyglot lint autofix (mago/ruff/taplo/rumdl/cargo-fmt)"
          git push origin "HEAD:${PR_HEAD_REF}"
