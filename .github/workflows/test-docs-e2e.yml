name: Test docs site (E2E + unit)

# Smoke + regression tests for the rspress docs site under `docs/`.
# Two lanes:
#
#   1. Unit lane — `bun test scripts/__tests__` validates pure functions
#      that the dev middleware uses (resolveReproFile etc.). No browser
#      needed; runs in seconds.
#
#   2. E2E lane — Playwright runs against `bunx rspress preview`,
#      asserting that every tracked page (EN + JA, 68 total) renders
#      with a non-empty <h1>, the rspress nav, and the footer; that the
#      EN ↔ JA file tree is symmetric and the locale switcher round-
#      trips; and that recipe pages reach their documented verdict
#      while exposing the loading-UX surface (vh-progress, vh-output
#      reveal) that previously regressed silently.
#
# Why this workflow exists (per the docs E2E PR notes): the rspress
# docs site has no PR-time test gate today. Past PRs accidentally
# broke component renders / nav / loading UX, and the regression
# only surfaced when a maintainer browsed the deploy and noticed.
# This workflow turns that class of breakage into a CI failure.
#
# Triggers:
# - `pull_request` touching docs/ or this workflow — fast feedback.
# - `push` to main on the same paths — catches anything that lands
#   despite a green PR (rare, but the cost of finding out post-merge
#   is much higher).
# - `workflow_dispatch` — manual re-run from the Actions tab.
#
# Fork-PR safe: uses `pull_request` (NOT `pull_request_target`). No
# secrets are needed; tests are read-only and produce no external
# side effects.

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/test-docs-e2e.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/test-docs-e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-flight runs when a PR receives a new commit; save Actions
# minutes.
concurrency:
  group: test-docs-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit (resolveReproFile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install + unit test
        run: |
          bun install --frozen-lockfile
          bun run test:unit

  e2e:
    name: E2E (Playwright against rspress preview)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers (Chromium + Firefox + WebKit)
        # Chromium covers Chrome and Microsoft Edge (Blink). Firefox
        # (Gecko) and WebKit (Safari) are the other two independent
        # engines Layer 1 reproductions need to boot WASM under.
        # `--with-deps` pulls each engine's OS-level libraries.
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright suite
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: playwright-report
          path: docs/playwright-report/
          retention-days: 7
